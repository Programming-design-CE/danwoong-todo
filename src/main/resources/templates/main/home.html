<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>메인 화면</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/memo.css}">
</head>
<body>
<main class="main-page">
  <img class="main-bg" th:src="@{/assets/main_background.png}" alt="동굴 배경">

  <section class="character-area">
    <img class="rock" th:src="@{/assets/rock.png}" alt="바위">

    <div class="danwoong-stack">
      <img class="main-equipped-layer main-equipped-layer--background" id="mainEquippedBackground" src="" alt="" hidden>
      <img class="danwoong" th:src="@{/assets/danwoong.png}" alt="단웅">
      <img class="main-equipped-layer main-equipped-layer--hat" id="mainEquippedHat" src="" alt="" hidden>
      <img class="main-equipped-layer main-equipped-layer--clothes" id="mainEquippedClothes" src="" alt="" hidden>
      <img class="main-equipped-layer main-equipped-layer--face" id="mainEquippedFace" src="" alt="" hidden>
      <img class="main-equipped-layer main-equipped-layer--hand" id="mainEquippedHand" src="" alt="" hidden>
      <img class="main-equipped-layer main-equipped-layer--foot" id="mainEquippedFoot" src="" alt="" hidden>

    </div>
    <img class="danbi" th:src="@{/assets/danbi.png}" alt="단비">

    <div class="nickname" id="nicknameText"></div>
    <div class="touch-text">건드리지 마...</div>
  </section>

  <section class="menu-area">
    <button class="menu-btn" id="todoBtn">오늘의 할 일</button>
    <button class="menu-btn" id="closetBtn">단웅이의 옷장</button>
    <button class="menu-btn" id="shopBtn">마늘 상점</button>
  </section>

  <button class="memo-toggle-btn" id="memoToggleBtn" type="button">📝</button>

  <button class="friend-icon-btn" id="friendIconBtn" type="button">
    👥
  </button>

  <section class="friend-panel" id="friendPanel">
    <div class="friend-board">
      <button class="friend-close-btn" id="friendCloseBtn" type="button">×</button>

      <div class="friend-column my-friend-column">
        <h2>친구</h2>
        <div class="friend-list" id="friendList"></div>
      </div>

      <div class="friend-divider"></div>

      <div class="friend-column request-column">
        <h2>친구 요청 목록</h2>

        <div class="request-section-title">받은 요청</div>
        <div class="request-list" id="requestList"></div>

        <div class="request-section-title request-section-title--sent">보낸 요청</div>
        <div class="request-list request-list--sent" id="sentRequestList"></div>

        <button class="open-add-friend-btn" id="openAddFriendBtn" type="button">
          친구 추가
        </button>
      </div>

      <div class="friend-search-box" id="friendSearchBox">
        <h3>친구 추가</h3>

        <div class="friend-search-input-wrap">
          <input id="friendSearchInput" type="text" placeholder="친구 닉네임 검색">
          <button id="friendSearchBtn" type="button">🔍</button>
        </div>

        <div class="friend-search-result" id="friendSearchResult"></div>
      </div>
    </div>
  </section>

  <div class="memo-planner-panel" id="memoPlannerPanel">
    <div class="planner-header">
      <div class="planner-date" id="plannerDate"></div>
      <div class="planner-day" id="plannerDay"></div>
      <button class="planner-close-btn" id="plannerCloseBtn" type="button">×</button>
    </div>
    <div class="planner-body" id="plannerBody"></div>
    <div class="planner-footer">
      <input class="planner-input" id="plannerInput" type="text" placeholder="할 일을 입력하세요..">
      <button class="planner-add-btn" id="plannerAddBtn" type="button">추가</button>
    </div>
  </div>

</main>

<script th:src="@{/js/main.js}"></script>
<script th:src="@{/js/memo.js}"></script>
</body>
</html>
