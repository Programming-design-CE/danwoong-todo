<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 할 일</title>
    <link rel="stylesheet" href="/css/todo.css">
</head>
<body>

<div class="page-label" id="pageLabel">오늘의 할 일 - 기본(메모장)</div>

<div class="todo-page">

    <!-- 헤더 -->
    <div class="todo-header">
        <button class="btn-back" onclick="history.back()">←</button>
        <h1 class="todo-title">오늘의 할 일</h1>
        <label class="toggle-switch">
            <input type="checkbox" id="toggleSwitch">
            <span class="toggle-slider"></span>
        </label>
    </div>

    <!-- 본문 -->
    <div class="todo-body">

        <!-- 왼쪽 -->
        <div class="todo-main">

            <!-- 탭 -->
            <div class="todo-tabs">
                <button class="todo-tab active" data-tab="progress">☰ 진행중인 프로젝트 <span id="progressCount">0</span></button>
                <button class="todo-tab" data-tab="completed">✓ 완료된 프로젝트</button>
                <button class="todo-tab" data-tab="calendar">📅 캘린더</button>
                <button class="todo-tab" data-tab="files">📄 파일&자료</button>
            </div>

            <!-- 필터 -->
            <div class="filter-bar">
                <button class="filter-btn">전체 카테고리 ▾</button>
                <button class="filter-btn">최근 추가순 ▾</button>
            </div>

            <!-- 프로젝트 목록 -->
            <div class="project-list" id="projectList"></div>

        </div>

        <!-- 오른쪽 메모장 -->
        <div class="memo-panel">

            <div class="memo-header">
                <button class="memo-header-btn" id="memoHeaderBtn">
                    <span class="memo-label">메모장</span>
                    <span class="memo-pencil">✏</span>
                </button>
                <button class="memo-more">⋮</button>
            </div>

            <div class="memo-dropdown" id="memoDropdown">
                <div class="memo-dropdown-item active" data-val="basic">기본</div>
            </div>

            <div class="memo-body">
                <div class="memo-textarea" id="memoTextarea" contenteditable="true" data-placeholder="메모를 입력하세요..."></div>
            </div>

            <div class="memo-footer" id="memoFooter"></div>

        </div>
    </div>
</div>

<!-- 프로젝트 추가 모달 -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-top">
            <span class="modal-title">프로젝트 추가하기</span>
            <button class="modal-close" id="modalClose">✕</button>
        </div>

        <div class="form-group">
            <label class="form-label">할 일 제목 <span class="required">*</span></label>
            <input type="text" class="form-input" id="groupName" placeholder="예) 발표자료(PPT) 제작" maxlength="50">
            <div class="char-count"><span id="nameCount">0</span>/50</div>
        </div>

        <div class="form-group">
            <label class="form-label">설명 (선택)</label>
            <textarea class="form-input" id="groupDesc" placeholder="할 일에 대한 내용을 입력하세요 (선택)" maxlength="200" rows="3"></textarea>
            <div class="char-count"><span id="descCount">0</span>/200</div>
        </div>

        <div class="form-row">
            <div class="form-group" style="margin-bottom:0; position:relative;">
                <label class="form-label">담당자</label>
                <div class="assignee-wrap" id="assigneeWrap">
                    <button class="btn-add-assignee" id="btnAddAssignee">+</button>
                </div>
                <div class="friend-picker" id="friendPicker"></div>
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">우선순위</label>
                <select class="priority-select" id="groupPriority">
                    <option value="LOW">🚩 낮음</option>
                    <option value="MEDIUM" selected>🚩 보통</option>
                    <option value="HIGH">🚩 높음</option>
                </select>
            </div>
        </div>

        <div class="form-row" style="margin-top:16px;">
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">마감일</label>
                <input type="date" class="form-input" id="groupDeadline">
            </div>
            <div class="form-group" style="margin-bottom:0;">
                <label class="form-label">마늘 개수</label>
                <input type="number" class="form-input" id="groupGarlic" placeholder="개수를 입력해주세요" min="0">
            </div>
        </div>

        <div class="form-group" style="margin-top:16px;">
            <label class="form-label">카테고리</label>
            <div class="category-list">
                <button class="category-btn active" data-val="학교">🎓 학교</button>
                <button class="category-btn" data-val="대외활동">📋 대외활동</button>
                <button class="category-btn" data-val="스터디">📚 스터디</button>
                <button class="category-btn" data-val="개인">👤 개인</button>
                <button class="category-btn" data-val="기타">··· 기타</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">프로젝트 색상</label>
            <div class="color-list" id="colorList">
                <div class="color-dot active" data-color="#4CAF7D" style="background:#4CAF7D;">✓</div>
                <div class="color-dot" data-color="#7BC67E" style="background:#7BC67E;"></div>
                <div class="color-dot" data-color="#D4A843" style="background:#D4A843;"></div>
                <div class="color-dot" data-color="#E07B54" style="background:#E07B54;"></div>
                <div class="color-dot" data-color="#C85C5C" style="background:#C85C5C;"></div>
                <div class="color-dot" data-color="#B87EC8" style="background:#B87EC8;"></div>
                <div class="color-dot" data-color="#7B9EC8" style="background:#7B9EC8;"></div>
                <div class="color-dot" data-color="#5B8AC8" style="background:#5B8AC8;"></div>
                <div class="color-dot" data-color="#7B7B7B" style="background:#7B7B7B;"></div>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancel">취소</button>
            <button class="btn-submit" id="btnSubmit">✓ 추가하기</button>
        </div>
    </div>
</div>

<script th:src="@{/js/todo.js}"></script>
</body>
</html>
