<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 완료된 할 일</title>
    <link rel="stylesheet" href="/css/todo/common.css">
    <link rel="stylesheet" href="/css/todo/mytodos/placeholder.css">
    <script src="/js/todo-common.js" defer></script>
</head>
<body>
<div class="todo-page">
    <div th:replace="~{todo/fragments/header :: header('개인 할 일', '내가 완료한 할 일을 따로 정리해서 볼 수 있어요.', true, '/todos/working')}"></div>

    <div class="todo-body">
        <main class="todo-main">
            <div th:replace="~{todo/fragments/tabs :: tabs('mytodos', 'completed', '5', '23')}"></div>

            <section class="todo-content-placeholder">
                <div class="todo-placeholder-card">
                    <h2>개인 완료된 할 일 페이지</h2>
                    <p>완료 내역과 회고 영역을 이 페이지에서 독립적으로 작업하면 됩니다.</p>
                </div>
            </section>
        </main>

        <div th:replace="~{todo/fragments/memo-panel :: memo('/todos/my/note')}"></div>
    </div>
</div>
</body>
</html>
