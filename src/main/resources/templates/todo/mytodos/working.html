<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개인 할 일</title>
    <link rel="stylesheet" href="/css/todo/common.css">
    <link rel="stylesheet" href="/css/todo/mytodos/mytodos.css">
    <script src="/js/todo-common.js" defer></script>
    <script src="/js/mytodos-working.js" defer></script>
</head>
<body>
<div class="todo-page">
    <div th:replace="~{todo/fragments/header :: header('개인 할 일', '내가 담당하고 있는 모든 할 일', true, '/todos/working')}"></div>

    <div class="todo-body">
        <main class="todo-main">
            <div th:replace="~{todo/fragments/tabs :: tabs('mytodos', 'working', '0', '0')}"></div>

            <div class="filter-bar">
                <div style="position: relative; display: inline-block;">
                    <select class="filter-btn" id="sortSelect" style="appearance:none; -webkit-appearance:none; outline:none; cursor:pointer; padding-right:24px;">
                        <option value="recent">최근 추가순</option>
                        <option value="oldest">오래된 순</option>
                        <option value="deadline">마감일 순</option>
                    </select>
                    <span class="filter-caret" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; font-size: 10px;">▾</span>
                </div>
            </div>

            <div class="mytodo-scroll-area">
                <div class="mytodo-list" id="mytodoList"></div>
            </div>
        </main>

        <div th:replace="~{todo/fragments/memo-panel :: memo('/todos/my/note')}"></div>
    </div>
</div>

<!-- 할 일 상세 모달 -->
<div class="mtm-overlay" id="mytodoModalOverlay">
    <div class="mtm-modal">

        <!-- 헤더 -->
        <div class="mtm-header">
            <div class="mtm-icon">📋</div>
            <div class="mtm-title-block">
                <div class="mtm-title">할 일 제목</div>
                <div class="mtm-category"></div>
            </div>
            <button class="mtm-close" type="button">✕</button>
        </div>

        <!-- 2컬럼 바디 -->
        <div class="mtm-body">

            <!-- 왼쪽: 상세 정보 -->
            <div class="mtm-left">
                <div class="mtm-row">
                    <span class="mtm-label">📅 마감일</span>
                    <span class="mtm-val mtm-deadline-val">-</span>
                </div>
                <div class="mtm-row">
                    <span class="mtm-label">🧄 예상 마늘</span>
                    <span class="mtm-val mtm-garlic-val">-</span>
                </div>
                <div class="mtm-row">
                    <span class="mtm-label">⚑ 우선순위</span>
                    <span class="mtm-val mtm-priority-val">-</span>
                </div>
                <div class="mtm-row">
                    <span class="mtm-label">👥 담당자</span>
                    <div class="mtm-val mtm-assignee-avatars"></div>
                </div>
                <div class="mtm-row mtm-desc-row">
                    <span class="mtm-label">📄 설명</span>
                    <span class="mtm-val mtm-desc-val">-</span>
                </div>
            </div>

            <!-- 오른쪽: 진행률 + 담당자별 완료 여부 -->
            <div class="mtm-right">
                <div class="mtm-progress-label">현재 진행률</div>
                <div class="mtm-progress-pct">0%</div>
                <div class="mtm-progress-bar">
                    <div class="mtm-progress-fill" style="width:0%"></div>
                </div>
                <div class="mtm-progress-pct-right">0%</div>

                <div class="mtm-section-title">담당자별 완료 여부</div>
                <div class="mtm-assignee-list"></div>
            </div>

        </div>

        <!-- 액션 버튼 -->
        <div class="mtm-actions">
            <button class="mtm-detail-btn" type="button">상세 보기</button>
            <button class="mtm-complete-btn" type="button">✓ 할 일 완료</button>
        </div>
    </div>
</div>
</body>
</html>
