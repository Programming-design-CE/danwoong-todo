<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>완료된 프로젝트</title>
    <link rel="stylesheet" href="/css/todo/common.css">
    <link rel="stylesheet" href="/css/todo/todos/placeholder.css">
    <script src="/js/todo-common.js" defer></script>
</head>
<body>
<div class="todo-page">
    <div th:replace="~{todo/fragments/header :: header('오늘의 할 일', '완료된 프로젝트를 모아보고 정리할 수 있어요.', false, '/mytodos/working')}"></div>

    <div class="todo-body">
        <main class="todo-main">
            <div th:replace="~{todo/fragments/tabs :: tabs('todos', 'completed', '4', '2')}"></div>

            <section class="todo-content-placeholder">
                <div class="todo-placeholder-card">
                    <h2>완료된 프로젝트 페이지</h2>
                    <p>여기에 완료된 그룹 할 일 목록과 회고 영역을 붙이면 됩니다.</p>
                </div>
            </section>
        </main>

        <div th:replace="~{todo/fragments/memo-panel :: memo('/todos/my/note')}"></div>
    </div>
</div>
</body>
</html>
