<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>캘린더</title>
    <link rel="stylesheet" href="/css/todo/common.css">
    <link rel="stylesheet" href="/css/todo/todos/calendar.css">
    <script src="/js/todo-common.js" defer></script>
    <script src="/js/todo-calendar.js" defer></script>
</head>
<body>
<div class="todo-page">
    <div th:replace="~{todo/fragments/header :: header('오늘의 할 일', '', false, '/mytodos/working')}"></div>

    <div class="todo-body">
        <main class="todo-main calendar-main">
            <div th:replace="~{todo/fragments/tabs :: tabs('todos', 'calendar', '4', '2')}"></div>

            <section class="calendar-toolbar">
                <div class="calendar-month-nav">
                    <button class="calendar-nav-btn" id="calendarPrevBtn" type="button" aria-label="이전 달">&lt;</button>
                    <h2 class="calendar-month-label" id="calendarMonthLabel">2026년 5월</h2>
                    <button class="calendar-nav-btn" id="calendarNextBtn" type="button" aria-label="다음 달">&gt;</button>
                </div>

                <div class="calendar-controls">
                    <select class="calendar-filter-select" id="calendarGroupFilter" aria-label="프로젝트 필터">
                        <option value="all">전체</option>
                    </select>
                    <div class="calendar-view-toggle" role="tablist" aria-label="calendar view">
                        <button class="calendar-view-btn is-active" id="calendarAssignedBtn" type="button" data-view="assigned">
                            나한테 배정된 할일
                        </button>
                        <button class="calendar-view-btn" id="calendarGroupBtn" type="button" data-view="group">
                            프로젝트 전체 일정
                        </button>
                    </div>
                </div>
            </section>

            <section class="calendar-board">
                <div class="calendar-weekdays">
                    <span>일</span>
                    <span>월</span>
                    <span>화</span>
                    <span>수</span>
                    <span>목</span>
                    <span>금</span>
                    <span>토</span>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </section>
        </main>

        <div th:replace="~{todo/fragments/memo-panel :: memo('/todos/my/note')}"></div>
    </div>
</div>
</body>
</html>
