<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파일과 자료</title>
    <link rel="stylesheet" href="/css/todo/common.css">
    <link rel="stylesheet" href="/css/todo/todos/placeholder.css">
    <script src="/js/todo-common.js" defer></script>
</head>
<body>
<div class="todo-page">
    <div th:replace="~{todo/fragments/header :: header('오늘의 할 일', '프로젝트에 필요한 파일과 자료를 모아둘 수 있어요.', false, '')}"></div>

    <div class="todo-body">
        <main class="todo-main">
            <div th:replace="~{todo/fragments/tabs :: tabs('todos', 'files', '4', '2')}"></div>

            <section class="todo-content-placeholder">
                <div class="todo-placeholder-card">
                    <h2>파일과 자료 페이지</h2>
                    <p>파일 목록, 폴더 구조, 업로드 버튼을 이 페이지에서 독립적으로 붙이면 됩니다.</p>
                </div>
            </section>
        </main>

        <div th:replace="~{todo/fragments/memo-panel :: memo('/todos/my/note')}"></div>
    </div>
</div>
</body>
</html>
