<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 할 일</title>
    <link rel="stylesheet" href="/css/todo/common.css">
    <link rel="stylesheet" href="/css/todo/todos/working.css">
    <script src="/js/todo-common.js" defer></script>
    <script src="/js/todo-working.js" defer></script>
</head>
<body>
<div class="todo-page">
    <div th:replace="~{todo/fragments/header :: header('오늘의 할 일', '', false, '/mytodos/working')}"></div>

    <div class="todo-body">
        <main class="todo-main">
            <div th:replace="~{todo/fragments/tabs :: tabs('todos', 'working', '4', '2')}"></div>

            <div class="filter-bar">
                <button class="filter-btn" type="button">
                    전체 카테고리 <span class="filter-caret">▾</span>
                </button>
                <button class="filter-btn" type="button">
                    최근 추가순 <span class="filter-caret">▾</span>
                </button>
            </div>

            <div class="project-scroll-area">
                <div class="project-list" id="projectList"></div>

                <div class="project-actions">
                    <button class="btn-add-project" id="btnAddProject" type="button">+ 프로젝트 추가하기</button>
                </div>
            </div>
        </main>

        <div th:replace="~{todo/fragments/memo-panel :: memo('/todos/my/note')}"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <div class="modal-top">
            <span class="modal-title">프로젝트 추가하기</span>
            <button class="modal-close" id="modalClose" type="button">×</button>
        </div>

        <div class="form-group">
            <label class="form-label" for="groupName">프로젝트 제목 <span class="required">*</span></label>
            <input id="groupName" type="text" class="form-input" placeholder="예) 발표 자료 준비" maxlength="50">
            <div class="char-count"><span id="nameCount">0</span>/50</div>
        </div>

        <div class="form-group">
            <label class="form-label" for="groupDesc">설명</label>
            <textarea id="groupDesc" class="form-input" placeholder="프로젝트 설명을 입력하세요." maxlength="200" rows="3"></textarea>
            <div class="char-count"><span id="descCount">0</span>/200</div>
        </div>

        <div class="form-row">
            <div class="form-group" style="margin-bottom: 0; position: relative;">
                <label class="form-label">담당자</label>
                <div class="assignee-wrap" id="assigneeWrap">
                    <button class="btn-add-assignee" id="btnAddAssignee" type="button">+</button>
                </div>
                <div class="friend-picker" id="friendPicker"></div>
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" for="groupPriority">우선순위</label>
                <select class="priority-select" id="groupPriority">
                    <option value="LOW">낮음</option>
                    <option value="MEDIUM" selected>보통</option>
                    <option value="HIGH">높음</option>
                </select>
            </div>
        </div>

        <div class="form-row" style="margin-top: 16px;">
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" for="groupDeadline">마감일</label>
                <input id="groupDeadline" type="date" class="form-input">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label class="form-label" for="groupGarlic">마늘 개수</label>
                <input id="groupGarlic" type="number" class="form-input" placeholder="보상을 입력하세요." min="0">
            </div>
        </div>

        <div class="form-group" style="margin-top: 16px;">
            <label class="form-label">카테고리</label>
            <div class="category-list">
                <button class="category-btn active" type="button" data-category="school" data-icon="S">학교</button>
                <button class="category-btn" type="button" data-category="activity" data-icon="A">대외활동</button>
                <button class="category-btn" type="button" data-category="study" data-icon="T">스터디</button>
                <button class="category-btn" type="button" data-category="personal" data-icon="P">개인</button>
                <button class="category-btn" type="button" data-category="etc" data-icon="E">기타</button>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">프로젝트 색상</label>
            <div class="color-list">
                <button class="color-dot active" type="button" data-color="#4CAF7D" style="background:#4CAF7D;">✓</button>
                <button class="color-dot" type="button" data-color="#7BC67E" style="background:#7BC67E;"></button>
                <button class="color-dot" type="button" data-color="#D4A843" style="background:#D4A843;"></button>
                <button class="color-dot" type="button" data-color="#E07B54" style="background:#E07B54;"></button>
                <button class="color-dot" type="button" data-color="#C85C5C" style="background:#C85C5C;"></button>
                <button class="color-dot" type="button" data-color="#B87EC8" style="background:#B87EC8;"></button>
                <button class="color-dot" type="button" data-color="#7B9EC8" style="background:#7B9EC8;"></button>
                <button class="color-dot" type="button" data-color="#5B8AC8" style="background:#5B8AC8;"></button>
                <button class="color-dot" type="button" data-color="#7B7B7B" style="background:#7B7B7B;"></button>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" id="btnCancel" type="button">취소</button>
            <button class="btn-submit" id="btnSubmit" type="button">추가하기</button>
        </div>
    </div>
</div>

<div class="project-context-menu hidden" id="projectContextMenu">
    <button class="project-context-item project-context-item--danger" id="deleteProjectAction" type="button">삭제</button>
</div>
</body>
</html>
