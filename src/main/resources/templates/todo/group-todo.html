<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 할 일</title>
  <link rel="stylesheet" href="/css/todo/common.css">
  <link rel="stylesheet" th:href="@{/css/group-todo.css}">
  <script src="/js/todo-common.js" defer></script>
  <script th:src="@{/js/group-todo.js}" defer></script>
</head>

<body>
  <div class="todo-page" data-back-url="/todos/working">
    <div th:replace="~{todo/fragments/header :: header('오늘의 할 일', '', false, '/mytodos/working')}"></div>

    <div class="todo-body">
      <main class="todo-main" id="leftPanel">
        <nav class="tab-bar" id="tabBar">
          <button class="tab-item active" data-tab="in-progress" type="button">
            <span class="tab-icon">☰</span>
            진행 중인 할 일 <span class="tab-count" id="inProgressCount">0</span>
          </button>
          <button class="tab-item" data-tab="completed" type="button">
            <span class="tab-icon">✓</span>
            완료된 할 일
          </button>
        </nav>

        <div class="group-info-bar">
          <div class="group-info-left">
            <span class="group-label">그룹 이름</span>
            <span class="group-name" id="groupName">프로젝트를 불러오는 중입니다</span>
            <span class="dday-badge" id="ddayBadge">-</span>
          </div>
          <div class="group-info-right">
            <button class="group-member-btn" id="openMemberModal" type="button">
              <div class="group-member-avatars" id="groupMemberAvatars"></div>
              <span>멤버 관리</span>
            </button>
            <button class="filter-btn" id="filterCategory" type="button">
              <span class="filter-icon">👤</span>
              전체 카테고리
              <span class="dropdown-arrow">▾</span>
            </button>
            <button class="filter-btn" id="filterSort" type="button">
              최근 추가순
              <span class="dropdown-arrow">▾</span>
            </button>
          </div>
        </div>

        <div class="todo-list" id="todoList"></div>

        <button class="add-todo-btn" id="addTodoBtn" type="button">
          <span class="add-icon">+</span>
          할 일 추가하기
        </button>
      </main>

      <aside class="memo-panel" id="rightPanel">
        <div class="memo-header">
          <div class="memo-header-btn">
            <span class="memo-label">메모장</span>
            <span class="memo-pencil">✎</span>
          </div>
          <button class="memo-more" id="memoMoreBtn" type="button">⋮</button>
        </div>
        <div class="memo-body" id="memoBody">
          <div class="memo-textarea" id="memoTextarea" contenteditable="true" data-placeholder="메모를 입력하세요..."></div>
        </div>
        <div class="memo-footer" id="memoFooter">자동 저장됨 · 오늘 14:30</div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="todoModal">
    <div class="modal-container">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">할 일 추가하기</h2>
        <button class="modal-close-btn" id="modalCloseBtn" type="button">✕</button>
      </div>

      <div class="modal-body modal-body--simple">
        <div class="modal-form">
          <div class="form-group">
            <label class="form-label">할 일 제목 <span class="required">*</span></label>
            <input type="text" class="form-input" id="todoTitleInput" placeholder="예) 발표자료(PPT) 제작" maxlength="50">
            <span class="char-count"><span id="titleCharCount">0</span>/50</span>
          </div>

          <div class="form-group">
            <label class="form-label">담당자 <span class="required">*</span></label>
            <div class="assignee-area" id="assigneeArea">
              <button class="assignee-add-btn" id="assigneeAddBtn" type="button">+</button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group half">
              <label class="form-label">마감일</label>
              <div class="date-input-wrapper">
                <span class="date-icon">📅</span>
                <input type="date" class="form-input date-input" id="todoDeadlineInput">
                <span class="date-placeholder" id="datePlaceholder">날짜 선택</span>
              </div>
            </div>
            <div class="form-group half">
              <label class="form-label">마늘 보상</label>
              <div class="garlic-input-wrapper">
                <span class="garlic-icon">🧄</span>
                <span class="garlic-label">총 마늘 보상</span>
                <button class="garlic-btn minus" id="garlicMinus" type="button">−</button>
                <span class="garlic-count" id="garlicCount">10</span>
                <button class="garlic-btn plus" id="garlicPlus" type="button">+</button>
                <span class="garlic-unit">개</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-cancel-btn" id="modalCancelBtn" type="button">취소</button>
        <button class="modal-submit-btn" id="modalSubmitBtn" type="button">
          <span class="submit-icon">✓</span>
          <span id="modalSubmitText">추가하기</span>
        </button>
      </div>
    </div>
  </div>

  <div class="context-menu hidden" id="contextMenu">
    <button class="context-item" id="contextEdit" type="button">
      <span class="context-icon">✏️</span>
      수정
    </button>
    <button class="context-item" id="contextDelete" type="button">
      <span class="context-icon">🗑️</span>
      삭제
    </button>
  </div>

  <div class="assignee-dropdown hidden" id="assigneeDropdown">
    <div class="assignee-search-wrap">
      <input type="text" class="assignee-search" id="assigneeSearch" placeholder="멤버 검색...">
    </div>
    <div class="assignee-options" id="assigneeOptions"></div>
  </div>

  <div class="member-modal-overlay" id="memberModal">
    <div class="member-modal">
      <div class="member-modal-header">
        <div class="member-modal-title-area">
          <h2 class="member-modal-title">
            <span class="member-modal-title-icon">👥</span>
            멤버 관리
          </h2>
          <p class="member-modal-subtitle">프로젝트 멤버를 확인하고 담당자를 고를 수 있습니다.</p>
        </div>
        <button class="member-modal-close" id="memberModalClose" type="button">✕</button>
      </div>

      <div class="member-modal-body">
        <div class="member-col">
          <div class="member-col-header">
            <span class="member-col-title" id="friendCountLabel">내 친구 (0)</span>
          </div>
          <input type="text" class="member-search-input" id="memberSearchInput" placeholder="닉네임으로 검색하기">
          <div class="member-list" id="friendListArea"></div>
        </div>

        <div class="member-col">
          <div class="member-col-header">
            <span class="member-col-title" id="projectMemberCountLabel">프로젝트 멤버 (0/10)</span>
            <button class="member-remove-all" id="memberRemoveAll" type="button">모두 제거</button>
          </div>
          <div class="member-list" id="projectMemberListArea"></div>
        </div>
      </div>

      <div class="member-modal-footer">
        <button class="member-modal-cancel" id="memberModalCancel" type="button">닫기</button>
        <button class="member-modal-confirm" id="memberModalConfirm" type="button">
          확인 (<span id="memberConfirmCount">0</span>명)
        </button>
      </div>
    </div>
  </div>
</body>

</html>
