<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<body>
<div th:fragment="header(title, subtitle, personalMode, toggleUrl)" class="todo-header">
    <button class="btn-back" type="button" onclick="window.location.href='/main'">&lt;</button>

    <div class="todo-heading">
        <div class="todo-heading-top">
            <h1 class="todo-title" th:text="${title}">오늘의 할 일</h1>
            <label class="toggle-switch" th:if="${toggleUrl != null and !#strings.isEmpty(toggleUrl)}">
                <input
                    id="todoModeToggle"
                    type="checkbox"
                    th:checked="${personalMode}"
                    th:attr="data-toggle-url=${toggleUrl}">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <div class="todo-header-spacer"></div>
</div>
</body>
</html>
